server {
    listen 80;
    server_name 18.60.42.110;
    error_log /var/lib/jenkins/workspace/django_simple_CICD/logs/error.log;
    access_log /var/lib/jenkins/workspace/django_simple_CICD/logs/access.log;


    location = /favicon.ico { access_log off; log_not_found off; }
    location /static/ {
        root /var/lib/jenkins/workspace/django_simple_CICD;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://unix:/run/gunicorn.sock;
    }
}